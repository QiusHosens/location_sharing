name: location_sharing
description: 定位共享 - 家人位置安心守护
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.2
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9
  dio: ^5.9.2
  logger: ^2.7.0
  flutter_riverpod: '>=2.6.1 <3.0.0'
  go_router: ^17.2.1
  shared_preferences: ^2.5.5
  mqtt_client: ^10.11.10
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  json_annotation: ^4.11.0
  flutter_local_notifications: ^20.1.0
  geolocator: ^14.0.2
  battery_plus: ^7.0.0
  image_picker: ^1.2.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true
