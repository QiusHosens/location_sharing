name: location_sharing
description: 定位共享 - 家人位置安心守护
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # 1.0.9+ 要求 SDK ^3.9，与 Dart 3.6 不符时锁定 1.0.8
  cupertino_icons: 1.0.8
  dio: ^5.4.0
  logger: ^2.4.0
  # Riverpod 3.x 依赖 riverpod_annotation 4，需 Dart ≥3.7；在 SDK 3.6 上保留 2.x
  flutter_riverpod: '>=2.6.1 <3.0.0'
  go_router: '>=14.0.0 <16.2.0'
  shared_preferences: ^2.2.2
  amap_flutter_map: ^3.0.0
  amap_flutter_base: ^3.0.0
  amap_flutter_location: ^3.0.0
  mqtt_client: ^10.2.0
  permission_handler: ^11.3.0
  url_launcher: ^6.2.0
  json_annotation: ^4.8.1
  # 19.x 易与旧 AGP/D8 冲突；17.x 功能足够且 Android 侧要求更温和
  flutter_local_notifications: ^17.2.0
  # geolocator_android 5.x 依赖 Color.toARGB32()（Flutter 3.29+）；旧版 Flutter 请用 13.x
  geolocator: '>=13.0.0 <14.0.0'
  battery_plus: ^6.0.0
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
