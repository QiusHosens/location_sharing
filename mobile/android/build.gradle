allprojects {
    repositories {
        google()
        mavenCentral()
    }
    // 避免 error_prone_annotations 新版本在旧 D8 上 dex 失败（若仍拉取高版本可保留）
    configurations.configureEach {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == "com.google.errorprone" && details.requested.name == "error_prone_annotations") {
                details.useVersion("2.23.0")
            }
        }
    }
}

// 与 Flutter 插件内 FlutterExtension 字段对齐；插件子工程在 android { } 里写 flutter.compileSdkVersion 时，
// 需在 com.android.library 配置前具备 project.flutter（AGP 8+ 闭包解析会误找 android.flutter）。
class FlutterPluginCompat {
    int compileSdkVersion = 35
    int minSdkVersion = 21
    int targetSdkVersion = 35
}

rootProject.buildDir = "../build"
subprojects { subproject ->
    subproject.beforeEvaluate {
        if (subproject.name != "app" && subproject.extensions.findByName("flutter") == null) {
            subproject.extensions.create("flutter", FlutterPluginCompat)
        }
    }
    subproject.buildDir = "${rootProject.buildDir}/${subproject.name}"
    // 仅补丁高德等旧 library：AGP 8+ 需 namespace，且勿对全量子工程 withId（会干扰 Flutter 主工程）
    if (subproject.name == "amap_flutter_location" || subproject.name == "amap_flutter_map") {
        subproject.plugins.withId("com.android.library") {
            subproject.android {
                def manifestFile = subproject.file("src/main/AndroidManifest.xml")
                if (manifestFile.exists()) {
                    def text = manifestFile.getText("UTF-8")
                    def matcher = text =~ /package="([^"]+)"/
                    if (matcher.find()) {
                        def pkg = matcher.group(1)
                        if (namespace == null || namespace.toString().isEmpty()) {
                            namespace = pkg
                        }
                    }
                }
            }
        }
    }
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
