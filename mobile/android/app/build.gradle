plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.ls.location_sharing"
    // 与 Flutter 3.35 模板对齐，且满足新插件对 API 级别的要求
    compileSdk = Math.max(flutter.compileSdkVersion as int, 36)
    // 与当前 Android 插件生态声明对齐，避免构建期间 NDK 版本告警
    ndkVersion = "27.0.12077973"

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.ls.location_sharing"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = Math.max(flutter.targetSdkVersion as int, 36)
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // 与较新 AGP 组合搭配，供本项目通知等插件使用 Java 新 API
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.5"
}
