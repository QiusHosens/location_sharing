# 在仓库根目录执行: docker compose -f deploy/docker/docker-compose.yml up -d --build
# 或在 deploy/docker 目录执行: docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: location_sharing
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d location_sharing"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  emqx:
    image: emqx/emqx:5.4.1
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: emqx
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/location_sharing
      REDIS_URL: redis://redis:6379
      MQTT_HOST: emqx
      MQTT_PORT: "1883"
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_ADMIN_SECRET: ${JWT_ADMIN_SECRET:-dev-admin-jwt-secret-change-in-production}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_started

  admin:
    build:
      context: ../..
      dockerfile: Dockerfile.admin
    ports:
      - "3001:80"
    depends_on:
      - backend

  web:
    build:
      context: ../..
      dockerfile: Dockerfile.web
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
