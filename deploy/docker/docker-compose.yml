# 在仓库根目录执行: docker compose -f deploy/docker/docker-compose.yml up -d --build
# 数据目录: 仓库根目录下 data/postgres、data/emqx（见下方 volumes 绑定挂载）

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: location_sharing
    volumes:
      # 宿主机目录挂载（相对本 compose 文件所在目录的上两级 = 仓库根）
      - ../../data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d location_sharing"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  emqx:
    image: emqx/emqx:5.4.1
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: emqx
    volumes:
      - ../../data/emqx/data:/opt/emqx/data
      - ../../data/emqx/log:/opt/emqx/log
    ports:
      # EMQX 常用监听端口全部映射到宿主机
      - "1883:1883"   # MQTT
      - "8883:8883"   # MQTT/SSL
      - "8083:8083"   # MQTT/WebSocket
      - "8084:8084"   # MQTT/WebSocket/SSL
      - "18083:18083" # Dashboard
      - "18084:18084" # Dashboard SSL

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/location_sharing
      REDIS_URL: redis://redis:6379
      MQTT_HOST: emqx
      MQTT_PORT: "1883"
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_ADMIN_SECRET: ${JWT_ADMIN_SECRET:-dev-admin-jwt-secret-change-in-production}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_started

  admin:
    build:
      context: ../..
      dockerfile: Dockerfile.admin
    ports:
      - "3001:80"
    depends_on:
      - backend

  web:
    build:
      context: ../..
      dockerfile: Dockerfile.web
    ports:
      - "3000:80"
    depends_on:
      - backend
