apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: location-sharing
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18.3-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: location_sharing
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: location-secrets
                  key: postgres-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d location_sharing"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d location_sharing"]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        # 节点本地目录（请确保节点上路径可写；多副本时需使用共享存储）
        - name: data
          hostPath:
            path: /data/location-sharing/postgres
            type: DirectoryOrCreate
