apiVersion: apps/v1
kind: Deployment
metadata:
  name: emqx
  namespace: location-sharing
  labels:
    app: emqx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emqx
  template:
    metadata:
      labels:
        app: emqx
    spec:
      containers:
        - name: emqx
          image: emqx/emqx:5.4.1
          ports:
            - name: mqtt
              containerPort: 1883
            - name: ws
              containerPort: 8083
            - name: dashboard
              containerPort: 18083
          env:
            - name: EMQX_NAME
              value: emqx
            - name: EMQX_HOST
              value: "127.0.0.1"
          readinessProbe:
            tcpSocket:
              port: 1883
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
