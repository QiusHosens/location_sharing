apiVersion: apps/v1
kind: Deployment
metadata:
  name: emqx
  namespace: location-sharing
  labels:
    app: emqx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emqx
  template:
    metadata:
      labels:
        app: emqx
    spec:
      containers:
        - name: emqx
          image: emqx/emqx:5.8.8
          ports:
            - name: mqtt
              containerPort: 1883
            - name: mqtt-ssl
              containerPort: 8883
            - name: ws
              containerPort: 8083
            - name: wss
              containerPort: 8084
            - name: dashboard
              containerPort: 18083
            - name: dashboard-ssl
              containerPort: 18084
          env:
            - name: EMQX_NAME
              value: emqx
            - name: EMQX_HOST
              value: "127.0.0.1"
          volumeMounts:
            - name: emqx-data
              mountPath: /opt/emqx/data
            - name: emqx-log
              mountPath: /opt/emqx/log
          readinessProbe:
            tcpSocket:
              port: 1883
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
      volumes:
        - name: emqx-data
          hostPath:
            path: /data/location-sharing/emqx-data
            type: DirectoryOrCreate
        - name: emqx-log
          hostPath:
            path: /data/location-sharing/emqx-log
            type: DirectoryOrCreate
