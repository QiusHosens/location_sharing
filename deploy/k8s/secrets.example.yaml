# 复制为 secrets.yaml 并修改敏感字段后应用: kubectl apply -f secrets.yaml
# 切勿将 secrets.yaml 提交到版本库
apiVersion: v1
kind: Secret
metadata:
  name: location-secrets
  namespace: location-sharing
type: Opaque
stringData:
  # 需与下方 postgres-password 一致
  database-url: "postgres://postgres:locationsharing%40123@postgres:5432/location_sharing?options=-c%20TimeZone%3DAsia%2FShanghai&sslmode=disable&connect_timeout=5&application_name=location-sharing-api"
  redis-url: "redis://redis:6379"
  postgres-password: "locationsharing@123"
  jwt-secret: "locationsharing-user"
  jwt-admin-secret: "locationsharing-admin"
